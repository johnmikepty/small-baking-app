spring:
  application:
    name: banking

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USER:banking}
    password: ${DB_PASSWORD:banking}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── MongoDB ─────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/banking}

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: banking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.smallbankapp.banking.*"

# ── SQS (default disabled — enabled via profile) ─────────────
sqs:
  endpoint:    ""
  region:      ${AWS_REGION:us-east-2}
  access-key:  ${AWS_ACCESS_KEY_ID:test}
  secret-key:  ${AWS_SECRET_ACCESS_KEY:test}
  queue-url:   ""

# ── JWT ─────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}   # 1 hour

# ── OpenAPI / Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.smallbankapp.banking: DEBUG
    org.flywaydb: INFO

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# ── Profile: localstack ──────────────────────────────────────
# Use this profile to test SQS against LocalStack on Proxmox
# Start with: SPRING_PROFILES_ACTIVE=localstack
spring:
  config:
    activate:
      on-profile: localstack

sqs:
  endpoint:  http://192.168.1.145:4566
  region:    us-east-1
  access-key: test
  secret-key: test
  queue-url: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/banking-transactions

---
# ── Profile: aws ─────────────────────────────────────────────
# Production profile — uses AWS real services
# Credentials come from ECS IAM task role (no keys needed)
spring:
  config:
    activate:
      on-profile: aws

sqs:
  endpoint:  ""
  region:    us-east-2
  queue-url: https://sqs.us-east-2.amazonaws.com/721717798149/banking-transactions
