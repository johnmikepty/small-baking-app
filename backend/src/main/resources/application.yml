spring:
  application:
    name: banking

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USER:banking}
    password: ${DB_PASSWORD:banking}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── MongoDB ─────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/banking}

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: banking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.smallbankapp.banking.*"

# ── JWT ─────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}   # 1 hour

# ── OpenAPI / Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.smallbankapp.banking: DEBUG
    org.flywaydb: INFO

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
